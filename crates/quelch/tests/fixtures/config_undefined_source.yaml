# Invalid config: the ingest deployment references "ghost-source" which is not
# defined in sources.
azure:
  subscription_id: "sub-test"
  resource_group: "rg-test"
  region: "swedencentral"

cosmos:
  database: "quelch"

openai:
  endpoint: "https://test.openai.azure.com"
  embedding_deployment: "text-embedding-3-large"
  embedding_dimensions: 3072

sources:
  - type: jira
    name: jira-cloud
    url: "https://example.atlassian.net"
    auth:
      email: "user@example.com"
      api_token: "tok"
    projects: ["DO"]

deployments:
  - name: ingest
    role: ingest
    target: azure
    sources:
      - source: jira-cloud
      - source: ghost-source
