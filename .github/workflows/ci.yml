name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default. Individual jobs can opt up if they need more.
permissions:
  contents: read

# Cancel an in-flight CI run for the same branch when a new commit is pushed.
# Saves runner time on rapid-fire pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `cargo clippy --workspace -- -D warnings` strict-supersets `cargo check`,
      # so a separate `check` job would just duplicate work.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  binary-smoke-test:
    name: Binary smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p quelch
      - name: --version + --help
        run: |
          ./target/release/quelch --version
          ./target/release/quelch --help
      - name: validate against the test fixture
        run: ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml validate
      - name: effective-config (deterministic, no external services)
        run: ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml effective-config ingest
      - name: agent generate markdown bundle (exercises a non-trivial code path)
        run: |
          ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml \
            agent generate --target markdown --output /tmp/agent-bundle
          test -f /tmp/agent-bundle/connection.md
          test -f /tmp/agent-bundle/tools.md
          test -f /tmp/agent-bundle/schema.md
        timeout-minutes: 1
      - name: azure plan --no-what-if (offline; writes Bicep + rigg locally)
        run: |
          ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml \
            azure plan ingest --no-what-if
          test -f .quelch/azure/ingest.bicep
        timeout-minutes: 1
