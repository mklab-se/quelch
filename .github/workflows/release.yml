name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Run the full CI suite — including the binary smoke test — before
  # building release artifacts. We don't import ci.yml so this stays
  # readable and self-contained; keep it in lockstep with ci.yml.
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Build release binary (smoke test)
        run: cargo build --release -p quelch
      - name: --version + --help
        run: |
          ./target/release/quelch --version
          ./target/release/quelch --help
      - name: validate against the test fixture
        run: ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml validate
      - name: effective-config (deterministic, no external services)
        run: ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml effective-config ingest
      - name: agent generate markdown bundle
        run: |
          ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml \
            agent generate --target markdown --output /tmp/agent-bundle
          test -f /tmp/agent-bundle/connection.md
      - name: azure plan --no-what-if (offline)
        run: |
          ./target/release/quelch --config crates/quelch/tests/fixtures/quelch.minimal.yaml \
            azure plan ingest --no-what-if
          test -f .quelch/azure/ingest.bicep

  # Build release binaries for each platform
  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd "target/${TARGET}/release"
          tar czf "../../../quelch-${RELEASE_TAG}-${TARGET}.tar.gz" quelch
          cd ../../..
        env:
          TARGET: ${{ matrix.target }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/$env:TARGET/release/quelch.exe" -DestinationPath "quelch-$env:RELEASE_TAG-$env:TARGET.zip"
        env:
          TARGET: ${{ matrix.target }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: quelch-${{ matrix.target }}
          path: quelch-${{ github.ref_name }}-${{ matrix.target }}.*

  # Build and push Docker image to ghcr.io
  docker:
    name: Docker image (ghcr.io)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mklab-se/quelch:${{ github.ref_name }}
            ghcr.io/mklab-se/quelch:latest

  # Create GitHub Release with all binaries
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        # Must match the upload-artifact major version above (currently v5).
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  # Update Homebrew tap with new version and SHA256 hashes
  homebrew:
    name: Update Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/mklab-se/quelch/releases/download/${TAG}"

          # Download release artifacts and compute SHA256
          curl -sL --fail "${BASE_URL}/quelch-${TAG}-aarch64-apple-darwin.tar.gz" -o aarch64-darwin.tar.gz
          curl -sL --fail "${BASE_URL}/quelch-${TAG}-x86_64-apple-darwin.tar.gz" -o x86_64-darwin.tar.gz
          curl -sL --fail "${BASE_URL}/quelch-${TAG}-x86_64-unknown-linux-gnu.tar.gz" -o x86_64-linux.tar.gz

          SHA_AARCH64=$(sha256sum aarch64-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum x86_64-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum x86_64-linux.tar.gz | cut -d' ' -f1)

          # Generate formula
          cat > formula.rb <<RUBY
          class Quelch < Formula
            desc "Ingest data from Jira, Confluence, and more directly into Azure AI Search"
            homepage "https://github.com/mklab-se/quelch"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mklab-se/quelch/releases/download/v#{version}/quelch-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64}"
              else
                url "https://github.com/mklab-se/quelch/releases/download/v#{version}/quelch-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64}"
              end
            end

            on_linux do
              url "https://github.com/mklab-se/quelch/releases/download/v#{version}/quelch-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "quelch"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/quelch --version")
            end
          end
          RUBY

          # Push to homebrew-tap repo via GitHub API. Fail hard on
          # non-2xx responses — silently warning leaves users hitting
          # 404s on `brew install` because the tap is stale.
          CONTENT=$(base64 -w 0 < formula.rb)
          FILE_SHA=$(gh api repos/mklab-se/homebrew-tap/contents/Formula/quelch.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/mklab-se/homebrew-tap/contents/Formula/quelch.rb \
              -X PUT \
              -f message="Update quelch to ${VERSION}" \
              -f content="$CONTENT" \
              -f sha="$FILE_SHA"
            echo "Homebrew formula updated to ${VERSION}"
          else
            gh api repos/mklab-se/homebrew-tap/contents/Formula/quelch.rb \
              -X PUT \
              -f message="Add quelch ${VERSION}" \
              -f content="$CONTENT"
            echo "Homebrew formula created for ${VERSION}"
          fi

  # Publish to crates.io. Depends on `build` so a broken binary on any
  # platform blocks the crates.io publish — without this, a build
  # failure on tag would still leave a half-released version on
  # crates.io that nobody can install via the binary distributions.
  crates-io:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish quelch
        run: cargo publish -p quelch
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
